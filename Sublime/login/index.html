<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login & Registro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <div class="form-box">

    <!-- LOGIN -->
    <div class="form login-form active">
      <div class="logo-container">
        <img src="logo.png" alt="Logo">
        <h3>Bienvenido a Sublime</h3>
      </div>
      <h2>INICIAR SESIÓN</h2>

      <input type="text" id="loginEmail" placeholder="Email">
      <small class="error" id="loginEmailError"></small>

      <input type="password" id="loginPass" placeholder="Contraseña">
      <small class="error" id="loginPassError"></small>

      <button onclick="login()">Iniciar</button>

      <p onclick="toggleForm()">¿No tienes cuenta? Regístrate</p>
    </div>

    <!-- REGISTRO -->
    <div class="form register-form">
      <h2>REGISTRARSE</h2>

      <input type="text" id="regName" placeholder="Nombre Completo">
      <small class="error" id="regNameError"></small>

      <input type="email" id="regEmail" placeholder="Email">
      <small class="error" id="regEmailError"></small>

      <input type="password" id="regPass" placeholder="Contraseña">
      <small class="error" id="regPassError"></small>

      <input type="password" id="regPass2" placeholder="Confirmar Contraseña">
      <small class="error" id="regPass2Error"></small>

      <button onclick="register()">Registrar</button>

      <p onclick="toggleForm()">¿Ya tienes cuenta? Inicia sesión</p>
    </div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
